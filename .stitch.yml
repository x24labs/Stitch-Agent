languages: [python]
linter: ruff
test_runner: pytest
package_manager: pip

models:
  classifier: deepseek/deepseek-chat-v3.1
  light: qwen/qwen3.5-9b
  heavy: x-ai/grok-4.1-fast

max_attempts: 3

validation:
  max_diff_ratio: 0.40
  max_files_changed: 5
  max_lines_changed: 200
  block_new_imports: true
  block_signature_changes: true
  block_export_removal: true
