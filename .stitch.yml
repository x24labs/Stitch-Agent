languages: [python]
linter: ruff
test_runner: pytest
package_manager: pip

models:
  classifier: google/gemini-2.5-flash-lite
  light: google/gemini-2.5-flash-lite
  heavy: google/gemini-2.5-flash

max_attempts: 3

validation:
  max_diff_ratio: 0.40
  max_files_changed: 5
  max_lines_changed: 200
  block_new_imports: true
  block_signature_changes: true
  block_export_removal: true
